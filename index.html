<!doctype html>
<html lang="de" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravity Claw - Token-Kalkulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              ink: "#0b1020",
              panel: "#111827",
              line: "#263244"
            }
          }
        }
      };
    </script>
  </head>
  <body class="min-h-screen bg-ink text-slate-100 antialiased">
    <div class="min-h-screen">
      <header class="border-b border-line bg-slate-950/80 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4">
          <div>
            <p class="text-sm font-medium text-cyan-300">Gravity Claw 4.0</p>
            <h1 class="text-2xl font-semibold tracking-tight">Model Arbitrage Console</h1>
          </div>
          <div class="rounded-md border border-cyan-400/30 bg-cyan-400/10 px-3 py-2 text-sm text-cyan-100">
            Dark Mode aktiv
          </div>
        </div>
      </header>

      <div class="mx-auto grid max-w-7xl gap-6 px-5 py-6 lg:grid-cols-[320px_1fr]">
        <aside class="rounded-lg border border-line bg-panel p-4 shadow-xl shadow-black/20">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="text-lg font-semibold">Arbitrage Leaderboard</h2>
            <span class="rounded bg-emerald-400/10 px-2 py-1 text-xs font-medium text-emerald-300">Live Mock</span>
          </div>
          <div class="overflow-hidden rounded-md border border-line">
            <table class="w-full text-left text-sm">
              <thead class="bg-slate-900 text-xs uppercase tracking-wide text-slate-400">
                <tr>
                  <th class="px-3 py-3">Modell</th>
                  <th class="px-3 py-3">Provider</th>
                  <th class="px-3 py-3 text-right">Input</th>
                </tr>
              </thead>
              <tbody id="leaderboard" class="divide-y divide-line bg-slate-950/35">
                <tr>
                  <td class="px-3 py-4 text-slate-400" colspan="3">Lade Modelle...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </aside>

        <main class="rounded-lg border border-line bg-panel p-5 shadow-xl shadow-black/20">
          <div class="mb-5 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
            <div>
              <h2 class="text-xl font-semibold">Token-Kalkulator</h2>
              <p class="text-sm text-slate-400">Token-Approximation (1 Wort ≈ 1.3 Tokens)</p>
            </div>
            <label class="text-sm text-slate-300">
              Modell
              <select id="modelSelect" class="mt-1 block w-full rounded-md border border-line bg-slate-950 px-3 py-2 text-slate-100 outline-none ring-cyan-400/30 focus:ring-2 sm:w-64">
                <option>Lade Modelle...</option>
              </select>
            </label>
          </div>

          <div class="grid gap-5 lg:grid-cols-[1fr_280px]">
            <label class="block">
              <span class="mb-2 block text-sm font-medium text-slate-300">Prompt-Text</span>
              <textarea
                id="promptInput"
                class="min-h-64 w-full resize-y rounded-lg border border-line bg-slate-950 p-4 text-slate-100 outline-none ring-cyan-400/30 placeholder:text-slate-600 focus:ring-2"
                placeholder="Text hier eingeben..."
              ></textarea>
            </label>

            <section class="rounded-lg border border-line bg-slate-950/50 p-4">
              <label class="block">
                <span class="mb-2 flex items-center justify-between text-sm font-medium text-slate-300">
                  Cache-Slider (0-100%)
                  <strong id="cacheValue" class="text-cyan-300">0%</strong>
                </span>
                <input id="cacheSlider" type="range" min="0" max="100" value="0" class="w-full accent-cyan-400" />
              </label>

              <div class="mt-5 space-y-3 text-sm">
                <div class="flex justify-between border-b border-line pb-2">
                  <span class="text-slate-400">Wörter</span>
                  <strong id="wordCount">0</strong>
                </div>
                <div class="flex justify-between border-b border-line pb-2">
                  <span class="text-slate-400">Tokens</span>
                  <strong id="tokenCount">0</strong>
                </div>
                <div class="flex justify-between border-b border-line pb-2">
                  <span class="text-slate-400">Cache-Anteil</span>
                  <strong id="cachedTokens">0</strong>
                </div>
                <div class="pt-2">
                  <span class="text-sm text-slate-400">Geschätzte Input-Kosten</span>
                  <p id="costEstimate" class="mt-1 text-3xl font-semibold text-emerald-300">$0.000000</p>
                </div>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
